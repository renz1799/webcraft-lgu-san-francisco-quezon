name: Trigger GSO Core Sync

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Validate dispatch token
        env:
          DISPATCH_TOKEN: ${{ secrets.GSO_SYNC_DISPATCH_TOKEN }}
        run: |
          if [ -z "$DISPATCH_TOKEN" ]; then
            echo "::error::Missing secret GSO_SYNC_DISPATCH_TOKEN in the Core repository settings."
            exit 1
          fi

      - name: Trigger GSO sync workflow
        uses: actions/github-script@v7
        env:
          DISPATCH_TOKEN: ${{ secrets.GSO_SYNC_DISPATCH_TOKEN }}
        with:
          github-token: ${{ env.DISPATCH_TOKEN }}
          script: |
            await github.request('POST /repos/{owner}/{repo}/dispatches', {
              owner: 'renz1799',
              repo: 'GSO-System-for-San-Francisco-Quezon-V2',
              event_type: 'core-main-updated',
              client_payload: {
                source_repo: `${context.repo.owner}/${context.repo.repo}`,
                source_branch: context.ref.replace('refs/heads/', ''),
                source_sha: context.sha,
                source_run_id: String(context.runId),
                source_run_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              },
            });
            core.info('Dispatched core-main-updated event to GSO repository.');